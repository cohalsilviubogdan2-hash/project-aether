<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Aether</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a0e1a;
    --deep: #070b14;
    --accent: #4a90d9;
    --text: #d0d8e8;
    --text-dim: #6a7a95;
    --bubble-user: rgba(74,144,217,0.12);
    --bubble-lucian: rgba(15,25,50,0.85);
  }

  html, body {
    height: 100%;
    background: var(--deep);
    font-family: 'Jost', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 38%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 8%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 28%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 83% 55%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 13% 68%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 38% 82%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 58% 72%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 18%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 88%, rgba(255,255,255,0.25) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .layout {
    display: flex;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ===== LEFT PANEL ===== */
  .left-panel {
    width: 42%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    border-right: 1px solid rgba(74,144,217,0.08);
  }

  .left-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center 45%, rgba(26,58,110,0.25) 0%, transparent 65%);
    pointer-events: none;
  }

  .avatar-wrapper {
    position: relative;
    width: 300px;
    height: 360px;
  }

  .avatar-glow {
    position: absolute;
    inset: -25px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(74,144,217,0.2) 0%, rgba(74,144,217,0.04) 55%, transparent 70%);
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }

  .avatar-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(74,144,217,0.18);
    animation: rotate 22s linear infinite;
  }

  .avatar-ring::before {
    content: '';
    position: absolute;
    top: -3px;
    left: 50%;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 8px var(--accent);
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .avatar-frame {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(74,144,217,0.35);
    box-shadow:
      0 0 40px rgba(74,144,217,0.25),
      0 0 80px rgba(74,144,217,0.08),
      inset 0 0 30px rgba(10,14,26,0.4);
  }

  .avatar-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: brightness(0.92) contrast(1.05) saturate(0.85);
  }

  .avatar-frame::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 30%;
    background: linear-gradient(to top, rgba(7,11,20,0.75) 0%, transparent 100%);
  }

  /* Status only - no name, no title */
  .status-dot {
    margin-top: 1.8rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .speaking-indicator {
    display: none;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.58rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-top: 0.6rem;
    position: relative;
    z-index: 1;
  }

  .speaking-indicator.active { display: flex; }

  .speak-wave { display: flex; gap: 2px; align-items: center; }
  .speak-wave span {
    display: block;
    width: 2px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .speak-wave span:nth-child(1) { height: 5px; animation-delay: 0s; }
  .speak-wave span:nth-child(2) { height: 9px; animation-delay: 0.1s; }
  .speak-wave span:nth-child(3) { height: 7px; animation-delay: 0.2s; }
  .speak-wave span:nth-child(4) { height: 11px; animation-delay: 0.3s; }
  .speak-wave span:nth-child(5) { height: 5px; animation-delay: 0.4s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); opacity: 0.4; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  /* ===== RIGHT PANEL ===== */
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 1.5rem 1.5rem 1.5rem 1.8rem;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding-right: 0.4rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding-top: 0.5rem;
  }

  .messages::-webkit-scrollbar { width: 2px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(74,144,217,0.15); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    animation: fadeIn 0.35s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-items: flex-end; }
  .message.lucian { align-items: flex-start; }

  .msg-bubble {
    max-width: 85%;
    padding: 0.85rem 1.1rem;
    font-size: 0.87rem;
    font-weight: 300;
    line-height: 1.7;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .message.user .msg-bubble {
    background: var(--bubble-user);
    border: 1px solid rgba(74,144,217,0.18);
    border-radius: 4px 0 4px 4px;
  }

  .message.lucian .msg-bubble {
    background: var(--bubble-lucian);
    border: 1px solid rgba(74,144,217,0.1);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 4px;
  }

  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0.85rem 1.1rem;
    background: var(--bubble-lucian);
    border: 1px solid rgba(74,144,217,0.1);
    border-left: 2px solid var(--accent);
    border-radius: 0 4px 4px 4px;
    width: fit-content;
  }

  .typing span {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: typingDot 1.4s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(74,144,217,0.08);
    display: flex;
    gap: 0.7rem;
    align-items: flex-end;
  }

  #userInput {
    flex: 1;
    background: rgba(10,14,26,0.8);
    border: 1px solid rgba(74,144,217,0.18);
    border-radius: 3px;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.03em;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 48px;
    max-height: 120px;
  }

  #userInput:focus { border-color: rgba(74,144,217,0.45); }
  #userInput::placeholder { color: var(--text-dim); font-size: 0.78rem; letter-spacing: 0.1em; }

  .btn-send, .btn-mic {
    width: 48px; height: 48px;
    border: 1px solid rgba(74,144,217,0.25);
    border-radius: 50%;
    background: rgba(74,144,217,0.08);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-send:hover, .btn-mic:hover {
    background: rgba(74,144,217,0.2);
    border-color: rgba(74,144,217,0.5);
    box-shadow: 0 0 10px rgba(74,144,217,0.15);
  }

  .btn-send svg, .btn-mic svg { width: 17px; height: 17px; }

  .btn-mic.listening {
    background: rgba(220,50,50,0.12);
    border-color: rgba(220,50,50,0.45);
    color: #f87171;
    animation: micPulse 1s ease-in-out infinite;
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,50,50,0.25); }
    50% { box-shadow: 0 0 0 8px rgba(220,50,50,0); }
  }
</style>
</head>

    <div class="status-dot"><span class="dot"></span>Prezent</div>
    <div class="speaking-indicator" id="speakingIndicator">
      <div class="speak-wave"><span></span><span></span><span></span><span></span><span></span></div>
      Vorbește
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="messages" id="messages">
      <div class="message lucian">
        <div class="msg-bubble">Bună ziua. Sunt Lucian Ștefan. Cu ce te pot ajuta?</div>
      </div>
    </div>

    <div class="input-area">
      <button class="btn-mic" id="micBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <textarea id="userInput" rows="1" placeholder="Scrie un mesaj..."></textarea>
      <button class="btn-send" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const speakingIndicator = document.getElementById('speakingIndicator');

let history = [];
let isListening = false;
let currentUtterance = null;

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

sendBtn.addEventListener('click', sendMessage);

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : 'lucian');
  div.innerHTML = '<div class="msg-bubble">' + text + '</div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message lucian'; div.id = 'typing';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function speak(text) {
  if (!window.speechSynthesis) return;
  if (currentUtterance) speechSynthesis.cancel();
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = 'ro-RO';
  currentUtterance.rate = 0.88;
  currentUtterance.pitch = 0.82;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith('ro')) || voices.find(v => v.name.toLowerCase().includes('male'));
  if (v) currentUtterance.voice = v;
  speakingIndicator.classList.add('active');
  currentUtterance.onend = () => speakingIndicator.classList.remove('active');
  currentUtterance.onerror = () => speakingIndicator.classList.remove('active');
  speechSynthesis.speak(currentUtterance);
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  inputEl.value = ''; inputEl.style.height = 'auto';
  showTyping(); sendBtn.disabled = true;
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-12) })
    });
    const data = await res.json();
    removeTyping();
    if (data.reply) {
      addMessage('lucian', data.reply);
      history.push({ role: 'assistant', content: data.reply });
      speak(data.reply);
    }
  } catch(e) {
    removeTyping();
    addMessage('lucian', 'Eroare de conexiune.');
  }
  sendBtn.disabled = false;
}

// Speech Recognition
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SR();
  recognition.lang = 'ro-RO';
  recognition.onresult = e => { inputEl.value = e.results[0][0].transcript; sendMessage(); };
  recognition.onend = () => { isListening = false; micBtn.classList.remove('listening'); };
  recognition.onerror = () => { isListening = false; micBtn.classList.remove('listening'); };
  micBtn.addEventListener('click', () => {
    if (isListening) { recognition.stop(); }
    else { if (currentUtterance) speechSynthesis.cancel(); recognition.start(); isListening = true; micBtn.classList.add('listening'); }
  });
} else { micBtn.style.opacity = '0.3'; }

speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
</script>
