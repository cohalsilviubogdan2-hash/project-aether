<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucian Ștefan — Digital Twin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void: #02040b;
  --deep: #050912;
  --cosmos: #080e1f;
  --nebula-a: rgba(20,40,110,0.6);
  --nebula-b: rgba(40,15,90,0.5);
  --nebula-c: rgba(8,50,100,0.4);
  --accent: #5a9fd4;
  --accent2: #c8a96e;
  --text: #dce6f5;
  --dim: #5a6f92;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--void);
  font-family: 'Jost', sans-serif;
  color: var(--text);
}

/* ━━━ DEEP SPACE BACKGROUND ━━━ */
#bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 160% 120% at 30% 60%, #0a1428 0%, #030610 50%, #010308 100%);
}

/* Nebula layers */
.neb {
  position: fixed; border-radius: 50%; filter: blur(90px);
  pointer-events: none; z-index: 0;
}
.neb1 { width:900px; height:600px; top:-250px; left:-200px;
  background: radial-gradient(ellipse, rgba(15,35,100,0.5), rgba(35,10,85,0.3), transparent);
  animation: nebFloat 18s ease-in-out infinite; }
.neb2 { width:600px; height:700px; bottom:-300px; right:-150px;
  background: radial-gradient(ellipse, rgba(8,45,95,0.45), rgba(20,10,70,0.25), transparent);
  animation: nebFloat 24s ease-in-out infinite reverse; }
.neb3 { width:400px; height:400px; top:45%; left:40%;
  background: radial-gradient(ellipse, rgba(30,8,80,0.3), transparent);
  animation: nebFloat 30s ease-in-out infinite; opacity: 0.7; }

@keyframes nebFloat {
  0%,100% { transform: scale(1) translate(0,0); opacity:0.8; }
  33% { transform: scale(1.06) translate(15px,-10px); opacity:1; }
  66% { transform: scale(0.97) translate(-8px,12px); opacity:0.85; }
}

#stars { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ━━━ PASSWORD SCREEN ━━━ */
#pwScreen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2.8rem;
  background: var(--void);
  transition: opacity 0.9s ease, visibility 0.9s;
}
#pwScreen.gone { opacity:0; visibility:hidden; pointer-events:none; }

.pw-logo { text-align:center; }
.pw-logo-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem; font-weight: 300; letter-spacing: 0.1em;
  color: var(--text);
  display: block;
  text-shadow: 0 0 40px rgba(90,159,212,0.35);
}
.pw-logo-sub {
  font-size: 0.62rem; font-weight: 200; letter-spacing: 0.55em;
  color: var(--dim); text-transform: uppercase;
  margin-top: 0.6rem; display: block;
}

.pw-wrap { display:flex; flex-direction:column; align-items:center; gap:1rem; width:270px; }
.pw-input {
  width:100%; background: rgba(255,255,255,0.03);
  border: 1px solid rgba(90,159,212,0.2); border-radius:3px;
  padding: 0.9rem 1.2rem; color: var(--text);
  font-family: 'Jost', sans-serif; font-size:0.9rem; letter-spacing:0.35em;
  outline:none; text-align:center;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.pw-input:focus { border-color: rgba(90,159,212,0.5); box-shadow: 0 0 25px rgba(90,159,212,0.1); }
.pw-input::placeholder { color:rgba(255,255,255,0.18); letter-spacing:0.25em; }

.pw-btn {
  width:100%; background: rgba(90,159,212,0.1);
  border: 1px solid rgba(90,159,212,0.35); border-radius:3px;
  padding:0.9rem; color: var(--accent);
  font-family:'Jost',sans-serif; font-size:0.7rem; font-weight:300;
  letter-spacing:0.5em; text-transform:uppercase; cursor:pointer;
  transition: all 0.3s;
}
.pw-btn:hover { background:rgba(90,159,212,0.2); box-shadow:0 0 30px rgba(90,159,212,0.18); }
.pw-err { font-size:0.72rem; color:rgba(220,80,80,0.8); letter-spacing:0.1em; min-height:1rem; text-align:center; }

/* ━━━ MAIN LAYOUT ━━━ */
#app {
  position:fixed; inset:0; z-index:1;
  display:flex;
  opacity:0; transition: opacity 1.2s ease;
}
#app.on { opacity:1; }

/* LEFT: Portrait */
.portrait-side {
  position:relative;
  width:44%;
  min-width:280px;
  flex-shrink:0;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
}

/* Vignette sides on portrait */
.portrait-side::before {
  content:'';
  position:absolute; inset:0; z-index:4;
  background:
    linear-gradient(to right, var(--void) 0%, transparent 18%, transparent 82%, var(--cosmos) 100%),
    linear-gradient(to bottom, var(--void) 0%, transparent 12%, transparent 100%);
  pointer-events:none;
}

/* Subtle atmospheric glow behind subject */
.portrait-glow {
  position:absolute; inset:0; z-index:2;
  background: radial-gradient(ellipse 80% 90% at 50% 60%, rgba(40,80,160,0.12) 0%, transparent 70%);
  pointer-events:none;
}

.portrait-img {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  object-position:50% 15%;
  z-index:1;
  filter: brightness(0.95) contrast(1.08) saturate(0.82);
}

/* Divider line */
.portrait-side::after {
  content:'';
  position:absolute; right:0; top:0;
  width:1px; height:100%; z-index:5;
  background: linear-gradient(to bottom,
    transparent 0%,
    rgba(90,159,212,0.15) 20%,
    rgba(90,159,212,0.35) 50%,
    rgba(90,159,212,0.15) 80%,
    transparent 100%);
}

/* Identity */
.id-block {
  position:absolute; bottom:2.8rem; left:2.2rem; z-index:6;
}
.id-name {
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem; font-weight:300; letter-spacing:0.06em;
  color:var(--text);
  text-shadow:0 0 35px rgba(90,159,212,0.45);
  display:block;
}
.id-role {
  font-size:0.6rem; font-weight:200; letter-spacing:0.45em;
  color:var(--accent2); text-transform:uppercase;
  margin-top:0.35rem; display:block; opacity:0.85;
}
.id-online {
  display:inline-flex; align-items:center; gap:0.5rem;
  margin-top:0.65rem;
  font-size:0.58rem; letter-spacing:0.38em; color:var(--dim);
  text-transform:uppercase;
}
.id-online::before {
  content:''; width:5px; height:5px; border-radius:50%;
  background:#4ed99a; box-shadow:0 0 8px #4ed99a;
  animation:pulse2 2.2s ease-in-out infinite;
}
@keyframes pulse2 { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* Speaking wave */
.speak-wave {
  position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%);
  z-index:7; display:none; align-items:flex-end; gap:3px; height:22px;
}
.speak-wave.on { display:flex; }
.speak-wave .b {
  width:3px; background:var(--accent); border-radius:2px; opacity:0.7;
  animation: wv 0.7s ease-in-out infinite;
}
.speak-wave .b:nth-child(1){height:5px;animation-delay:0s;}
.speak-wave .b:nth-child(2){height:13px;animation-delay:0.1s;}
.speak-wave .b:nth-child(3){height:20px;animation-delay:0.2s;}
.speak-wave .b:nth-child(4){height:13px;animation-delay:0.3s;}
.speak-wave .b:nth-child(5){height:5px;animation-delay:0.4s;}
@keyframes wv { 0%,100%{transform:scaleY(0.35);opacity:0.4;} 50%{transform:scaleY(1);opacity:0.95;} }

/* RIGHT: Chat */
.chat-side {
  flex:1; min-width:0;
  display:flex; flex-direction:column;
  padding:1.8rem 1.8rem 1.5rem 1.6rem;
  overflow:hidden; position:relative;
}

.chat-head {
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:1.1rem;
  border-bottom:1px solid rgba(90,159,212,0.1);
  flex-shrink:0; margin-bottom:0.5rem;
}
.chat-head-title {
  font-size:0.65rem; font-weight:200; letter-spacing:0.5em;
  color:var(--dim); text-transform:uppercase;
}
.chat-head-badge {
  font-size:0.58rem; letter-spacing:0.3em;
  color:var(--accent2); opacity:0.6; text-transform:uppercase;
}

/* Messages */
.msgs {
  flex:1; overflow-y:auto;
  display:flex; flex-direction:column; gap:1.3rem;
  padding-right:4px;
  scroll-behavior:smooth;
}
.msgs::-webkit-scrollbar { width:2px; }
.msgs::-webkit-scrollbar-thumb { background:rgba(90,159,212,0.25); border-radius:2px; }
.msgs::-webkit-scrollbar-track { background:transparent; }

.msg { display:flex; flex-direction:column; max-width:90%; animation: fadeUp 0.35s ease forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

.msg-l { align-self:flex-start; }
.msg-u { align-self:flex-end; align-items:flex-end; }

.msg-who {
  font-size:0.56rem; letter-spacing:0.42em; text-transform:uppercase;
  color:var(--dim); margin-bottom:0.38rem;
}
.msg-l .msg-who { color:var(--accent2); opacity:0.75; }

.msg-bbl {
  padding:0.95rem 1.25rem;
  font-size:0.86rem; font-weight:300; line-height:1.75;
  border-radius:2px;
}
.msg-l .msg-bbl {
  background: rgba(8,14,32,0.92);
  border:1px solid rgba(90,159,212,0.13);
  border-left:2px solid rgba(90,159,212,0.45);
  color:var(--text);
  box-shadow:0 6px 24px rgba(0,0,0,0.35);
}
.msg-u .msg-bbl {
  background: rgba(90,159,212,0.08);
  border:1px solid rgba(90,159,212,0.22);
  color:var(--text);
}

/* Typing dots */
.typing-bbl {
  padding:0.95rem 1.25rem;
  background: rgba(8,14,32,0.92);
  border:1px solid rgba(90,159,212,0.13);
  border-left:2px solid rgba(90,159,212,0.45);
  display:flex; gap:5px; align-items:center; width:fit-content;
}
.typing-bbl span {
  width:5px; height:5px; background:var(--accent);
  border-radius:50%; opacity:0.5;
  animation:tdot 1.1s ease-in-out infinite;
}
.typing-bbl span:nth-child(2){animation-delay:0.18s;}
.typing-bbl span:nth-child(3){animation-delay:0.36s;}
@keyframes tdot { 0%,60%,100%{transform:translateY(0);opacity:0.4;} 30%{transform:translateY(-5px);opacity:1;} }

/* Input */
.input-zone {
  margin-top:1.2rem;
  border-top:1px solid rgba(90,159,212,0.1);
  padding-top:1.1rem;
  display:flex; align-items:flex-end; gap:0.75rem;
  flex-shrink:0;
}

textarea#ti {
  flex:1;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(90,159,212,0.18);
  border-radius:3px;
  padding:0.88rem 1rem;
  color:var(--text);
  font-family:'Jost',sans-serif; font-size:0.84rem; font-weight:300; line-height:1.55;
  resize:none; outline:none;
  min-height:46px; max-height:120px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
textarea#ti:focus { border-color:rgba(90,159,212,0.38); box-shadow:0 0 18px rgba(90,159,212,0.07); }
textarea#ti::placeholder { color:rgba(255,255,255,0.18); }

.btn-icon {
  width:44px; height:44px; border-radius:50%;
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.25s;
}
#vBtn {
  background:rgba(90,159,212,0.07);
  border:1px solid rgba(90,159,212,0.22);
  color:var(--accent);
}
#vBtn:hover { background:rgba(90,159,212,0.17); box-shadow:0 0 20px rgba(90,159,212,0.18); }
#vBtn.rec {
  background:rgba(200,60,60,0.12);
  border:1px solid rgba(200,60,60,0.45);
  color:#e06666;
  animation:vPulse 1s ease-in-out infinite;
}
@keyframes vPulse { 0%,100%{box-shadow:0 0 12px rgba(200,60,60,0.15);} 50%{box-shadow:0 0 28px rgba(200,60,60,0.38);} }

#sBtn {
  background:rgba(90,159,212,0.15);
  border:1px solid rgba(90,159,212,0.4);
  color:var(--accent);
}
#sBtn:hover { background:rgba(90,159,212,0.28); box-shadow:0 0 28px rgba(90,159,212,0.25); }
#sBtn:disabled { opacity:0.35; cursor:default; box-shadow:none; }

@media(max-width:680px) {
  .portrait-side { display:none; }
  .chat-side { padding:1.2rem; }
}
</style>
</head>
<body>

<div id="bg"></div>
<div class="neb neb1"></div>
<div class="neb neb2"></div>
<div class="neb neb3"></div>
<canvas id="stars"></canvas>

<!-- PASSWORD -->
<div id="pwScreen">
  <div class="pw-logo">
    <span class="pw-logo-name">Lucian Ștefan</span>
    <span class="pw-logo-sub">Digital Twin · Private Access</span>
  </div>
  <div class="pw-wrap">
    <input type="password" class="pw-input" id="pwIn" placeholder="· · · · · · · ·" maxlength="40" autocomplete="off"/>
    <button class="pw-btn" id="pwGo">Enter</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="portrait-side">
    <div class="portrait-glow"></div>
    <img class="portrait-img" id="pImg" src="" alt="Lucian Ștefan"/>
    <div class="speak-wave" id="sw">
      <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
    </div>
    <div class="id-block">
      <span class="id-name">Lucian Ștefan</span>
      <span class="id-role">Ship Security Officer · Digital Twin</span>
      <span class="id-online">Available</span>
    </div>
  </div>

  <div class="chat-side">
    <div class="chat-head">
      <span class="chat-head-title">Conversation</span>
      <span class="chat-head-badge">aetherme.ai · Legacy</span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="input-zone">
      <textarea id="ti" rows="1" placeholder="Ask Lucian something..."></textarea>
      <button class="btn-icon" id="vBtn" title="Voice">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="9" y="2" width="6" height="13" rx="3"/>

          <line x1="12" y1="20" x2="12" y2="23"/>
          <line x1="9" y1="23" x2="15" y2="23"/>
        </svg>
      </button>
      <button class="btn-icon" id="sBtn" title="Send">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
/* ── STARS ── */
(function(){
  const c = document.getElementById('stars');
  const cx = c.getContext('2d');
  let st = [];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function init(){
    st=[];
    const n = Math.floor(c.width*c.height/2200);
    for(let i=0;i<n;i++){
      const r = Math.random();
      st.push({
        x:Math.random()*c.width, y:Math.random()*c.height,
        radius: r<0.7 ? Math.random()*0.8+0.2 : Math.random()*1.6+0.8,
        alpha: Math.random()*0.65+0.1,
        speed: Math.random()*0.5+0.2,
        phase: Math.random()*Math.PI*2,
        color: r>0.85 ? '200,220,255' : r>0.95 ? '255,240,200' : '255,255,255'
      });
    }
  }
  let t=0;
  function draw(){
    cx.clearRect(0,0,c.width,c.height);
    t+=0.008;
    st.forEach(s=>{
      const a = s.alpha*(0.55+0.45*Math.sin(t*s.speed+s.phase));
      cx.beginPath();
      cx.arc(s.x,s.y,s.radius,0,Math.PI*2);
      cx.fillStyle='rgba('+s.color+','+a+')';
      cx.fill();
      // tiny cross for brighter stars
      if(s.radius>1.5){
        cx.strokeStyle='rgba('+s.color+','+(a*0.5)+')';
        cx.lineWidth=0.5;
        cx.beginPath(); cx.moveTo(s.x-s.radius*2,s.y); cx.lineTo(s.x+s.radius*2,s.y); cx.stroke();
        cx.beginPath(); cx.moveTo(s.x,s.y-s.radius*2); cx.lineTo(s.x,s.y+s.radius*2); cx.stroke();
      }
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();init();});
  resize(); init(); draw();
})();

/* ── STATE ── */
const PASS = 'lucian2026';
const history = [];
let busy = false;
let listening = false;
let recognition = null;

/* ── PASSWORD ── */
function unlock(){
  const v = document.getElementById('pwIn').value;
  const e = document.getElementById('pwErr');
  if(v === PASS){
    e.textContent='';
    document.getElementById('pwScreen').classList.add('gone');
    document.getElementById('app').classList.add('on');
    addMsg('l', "I am Lucian Ștefan. This is my digital twin — my memory, my voice, my story, preserved so it's never lost. What would you like to know?");
  } else {
    e.textContent = 'Access denied.';
    document.getElementById('pwIn').value='';
    document.getElementById('pwIn').focus();
  }
}
document.getElementById('pwGo').onclick = unlock;
document.getElementById('pwIn').onkeydown = e => { if(e.key==='Enter') unlock(); };

/* ── MESSAGES ── */
function addMsg(role, text){
  const box = document.getElementById('msgs');
  const w = document.createElement('div');
  w.className = 'msg msg-'+(role==='l'?'l':'u');
  const who = document.createElement('div');
  who.className = 'msg-who';
  who.textContent = role==='l' ? 'LUCIAN' : 'YOU';
  const bbl = document.createElement('div');
  bbl.className = 'msg-bbl';
  bbl.textContent = text;
  w.appendChild(who); w.appendChild(bbl);
  box.appendChild(w);
  box.scrollTop = box.scrollHeight;
  if(role==='l'){ history.push({role:'assistant',content:text}); speak(text); }
  else { history.push({role:'user',content:text}); }
}

function showTyping(){
  const box = document.getElementById('msgs');
  const w = document.createElement('div');
  w.className='msg msg-l'; w.id='tid';
  const who=document.createElement('div'); who.className='msg-who'; who.textContent='LUCIAN';
  const bbl=document.createElement('div'); bbl.className='typing-bbl';
  bbl.innerHTML='<span></span><span></span><span></span>';
  w.appendChild(who); w.appendChild(bbl);
  box.appendChild(w);
  box.scrollTop=box.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('tid'); if(t)t.remove(); }

/* ── VOICE SYNTHESIS ── */
const synth = window.speechSynthesis;
let currentUtt = null;

function getVoice(){
  const voices = synth.getVoices();
  // Priority: deep English male voices
  const names = ['david','james','daniel','alex','thomas','george','oliver','fred','english united states'];
  for(const n of names){
    const v = voices.find(v=>v.lang.startsWith('en') && v.name.toLowerCase().includes(n));
    if(v) return v;
  }
  return voices.find(v=>v.lang==='en-US') || voices.find(v=>v.lang.startsWith('en')) || null;
}

function speak(text){
  if(!synth) return;
  synth.cancel();
  const sw = document.getElementById('sw');
  // Small delay to let voices load
  setTimeout(()=>{
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US';
    utt.rate = 0.88;
    utt.pitch = 0.88;
    utt.volume = 1;
    const v = getVoice();
    if(v) utt.voice = v;
    utt.onstart = ()=>sw.classList.add('on');
    utt.onend = ()=>sw.classList.remove('on');
    utt.onerror = ()=>sw.classList.remove('on');
    synth.speak(utt);
    currentUtt = utt;
  }, 150);
}

// Preload voices
if(synth.onvoiceschanged !== undefined) synth.onvoiceschanged = ()=>synth.getVoices();

/* ── VOICE INPUT ── */
const vBtn = document.getElementById('vBtn');
if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang='en-US';
  recognition.interimResults=false;
  recognition.continuous=false;
  recognition.onresult = e=>{
    const t = e.results[0][0].transcript;
    document.getElementById('ti').value=t;
    stopListen();
    send();
  };
  recognition.onerror = ()=>stopListen();
  recognition.onend = ()=>stopListen();
}

function startListen(){
  if(!recognition) return;
  listening=true; vBtn.classList.add('rec');
  try{ recognition.start(); }catch(e){}
}
function stopListen(){
  listening=false; vBtn.classList.remove('rec');
  try{ recognition.stop(); }catch(e){}
}

vBtn.onclick = ()=>{ listening ? stopListen() : startListen(); };

/* ── SEND ── */
async function send(){
  const inp = document.getElementById('ti');
  const text = inp.value.trim();
  if(!text || busy) return;
  inp.value=''; inp.style.height='auto';
  busy=true; document.getElementById('sBtn').disabled=true;
  addMsg('u', text);
  showTyping();
  const msgs = history.filter(m=>m.role==='user'||m.role==='assistant').slice(-20);
  try{
    const r = await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs})
    });
    const d = await r.json();
    hideTyping();
    addMsg('l', d.reply || 'Something went wrong.');
  }catch(e){
    hideTyping();
    addMsg('l','Connection issue. Please try again.');
  }
  busy=false; document.getElementById('sBtn').disabled=false;
}

document.getElementById('sBtn').onclick = send;
document.getElementById('ti').onkeydown = e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} };
document.getElementById('ti').oninput = function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
};
</script>
