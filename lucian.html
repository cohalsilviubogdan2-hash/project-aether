<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>lucian.aetherme.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #020409;
  --text: #d8e4f5;
  --dim: #4a5f82;
  --accent: #4a8fd4;
}
html, body { height:100%; width:100%; overflow:hidden; background:var(--void); font-family:'Jost',sans-serif; color:var(--text); }

#bg { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse 180% 130% at 25% 55%, #07112a 0%, #030810 45%, #010206 100%); }
.neb { position:fixed; border-radius:50%; filter:blur(100px); pointer-events:none; z-index:0; }
.neb1 { width:800px; height:550px; top:-180px; left:-180px; background:radial-gradient(ellipse, rgba(12,28,90,0.45), rgba(28,8,75,0.25), transparent); animation:nf 20s ease-in-out infinite; }
.neb2 { width:550px; height:650px; bottom:-250px; right:-120px; background:radial-gradient(ellipse, rgba(6,38,85,0.4), rgba(15,8,60,0.2), transparent); animation:nf 26s ease-in-out infinite reverse; }
.neb3 { width:350px; height:350px; top:40%; left:38%; background:radial-gradient(ellipse, rgba(22,6,65,0.25), transparent); animation:nf 32s ease-in-out infinite; }
@keyframes nf { 0%,100%{transform:scale(1) translate(0,0);} 33%{transform:scale(1.07) translate(12px,-8px);} 66%{transform:scale(0.96) translate(-7px,10px);} }
#stars { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* PASSWORD */
#pw { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:3rem; transition:opacity 0.9s,visibility 0.9s; }
#pw.gone { opacity:0; visibility:hidden; pointer-events:none; }
.pw-name { font-family:'Cormorant Garamond',serif; font-size:2.2rem; font-weight:300; letter-spacing:0.12em; color:var(--text); text-align:center; text-shadow:0 0 50px rgba(74,143,212,0.3); }
.pw-wrap { display:flex; flex-direction:column; gap:1rem; width:260px; }
.pw-in { width:100%; background:rgba(255,255,255,0.03); border:1px solid rgba(74,143,212,0.18); border-radius:3px; padding:0.9rem 1.2rem; color:var(--text); font-family:'Jost',sans-serif; font-size:0.9rem; letter-spacing:0.35em; outline:none; text-align:center; transition:border-color 0.3s,box-shadow 0.3s; }
.pw-in:focus { border-color:rgba(74,143,212,0.45); box-shadow:0 0 20px rgba(74,143,212,0.08); }
.pw-in::placeholder { color:rgba(255,255,255,0.15); }
.pw-btn { width:100%; background:rgba(74,143,212,0.09); border:1px solid rgba(74,143,212,0.3); border-radius:3px; padding:0.88rem; color:var(--accent); font-family:'Jost',sans-serif; font-size:0.68rem; font-weight:300; letter-spacing:0.5em; text-transform:uppercase; cursor:pointer; transition:all 0.3s; }
.pw-btn:hover { background:rgba(74,143,212,0.18); box-shadow:0 0 25px rgba(74,143,212,0.15); }
.pw-err { font-size:0.7rem; color:rgba(210,70,70,0.8); text-align:center; min-height:1rem; letter-spacing:0.08em; }

/* MAIN */
#app { position:fixed; inset:0; z-index:1; display:flex; opacity:0; transition:opacity 1.3s ease; }
#app.on { opacity:1; }

/* PORTRAIT */
.side-img { position:relative; width:40%; min-width:260px; flex-shrink:0; overflow:hidden; }
.side-img::before { content:''; position:absolute; inset:0; z-index:3; pointer-events:none; background: linear-gradient(to right, var(--void) 0%, transparent 22%, transparent 78%, var(--void) 100%), linear-gradient(to bottom, var(--void) 0%, transparent 15%, transparent 88%, var(--void) 100%); }
.side-img img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:50% 20%; z-index:1; filter:brightness(0.88) contrast(1.06) saturate(0.78); }
.side-img::after { content:''; position:absolute; inset:0; z-index:2; pointer-events:none; background:radial-gradient(ellipse 70% 80% at 50% 50%, rgba(30,60,140,0.09) 0%, transparent 70%); }

/* speaking wave */
#sw { position:absolute; bottom:2rem; left:50%; transform:translateX(-50%); z-index:5; display:none; align-items:flex-end; gap:3px; height:20px; }
#sw.on { display:flex; }
#sw .b { width:3px; background:var(--accent); border-radius:2px; opacity:0.65; animation:wv 0.75s ease-in-out infinite; }
#sw .b:nth-child(1){height:5px;animation-delay:0s;}
#sw .b:nth-child(2){height:12px;animation-delay:0.12s;}
#sw .b:nth-child(3){height:19px;animation-delay:0.24s;}
#sw .b:nth-child(4){height:12px;animation-delay:0.36s;}
#sw .b:nth-child(5){height:5px;animation-delay:0.48s;}
@keyframes wv{0%,100%{transform:scaleY(0.3);opacity:0.35;}50%{transform:scaleY(1);opacity:0.9;}}

/* CHAT */
.side-chat { flex:1; min-width:0; display:flex; flex-direction:column; padding:2rem 2rem 1.6rem 1.4rem; overflow:hidden; }
.msgs { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:2rem; padding:0.5rem 0.5rem 0.5rem 0; scroll-behavior:smooth; }
.msgs::-webkit-scrollbar { width:2px; }
.msgs::-webkit-scrollbar-thumb { background:rgba(74,143,212,0.2); border-radius:2px; }
.msgs::-webkit-scrollbar-track { background:transparent; }
.msg { display:flex; flex-direction:column; animation:fadeUp 0.4s ease forwards; max-width:85%; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.msg-l { align-self:flex-start; font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-weight:300; line-height:1.85; color:rgba(220,232,252,0.92); font-style:italic; }
.msg-u { align-self:flex-end; font-family:'Jost',sans-serif; font-size:0.82rem; font-weight:300; line-height:1.7; color:rgba(180,200,230,0.65); text-align:right; }
.tdots { display:flex; gap:5px; align-items:center; padding:0.4rem 0; }
.tdots span { width:4px; height:4px; background:var(--accent); border-radius:50%; opacity:0.4; animation:td 1.1s ease-in-out infinite; }
.tdots span:nth-child(2){animation-delay:0.18s;} .tdots span:nth-child(3){animation-delay:0.36s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:0.3;}30%{transform:translateY(-4px);opacity:0.9;}}

/* INPUT */
.input-zone { margin-top:1.5rem; display:flex; align-items:flex-end; gap:0.7rem; flex-shrink:0; }
textarea#ti { flex:1; background:transparent; border:none; border-bottom:1px solid rgba(74,143,212,0.15); padding:0.7rem 0.2rem; color:rgba(210,225,248,0.8); font-family:'Jost',sans-serif; font-size:0.82rem; font-weight:300; line-height:1.5; resize:none; outline:none; min-height:40px; max-height:110px; transition:border-color 0.3s; }
textarea#ti:focus { border-bottom-color:rgba(74,143,212,0.4); }
textarea#ti::placeholder { color:rgba(255,255,255,0.15); }
.icon-btn { width:38px; height:38px; border-radius:50%; background:transparent; border:1px solid rgba(74,143,212,0.2); color:rgba(74,143,212,0.7); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.25s; }
.icon-btn:hover { border-color:rgba(74,143,212,0.5); color:var(--accent); box-shadow:0 0 18px rgba(74,143,212,0.15); }
#vBtn.rec { border-color:rgba(200,60,60,0.5); color:#d06060; animation:vp 1s ease-in-out infinite; }
@keyframes vp{0%,100%{box-shadow:0 0 8px rgba(200,60,60,0.1);}50%{box-shadow:0 0 22px rgba(200,60,60,0.35);}}
.icon-btn:disabled { opacity:0.25; cursor:default; }

@media(max-width:640px) { .side-img{display:none;} .side-chat{padding:1.2rem;} }
</style>
</head>
<body>
<div id="bg"></div>
<div class="neb neb1"></div><div class="neb neb2"></div><div class="neb neb3"></div>
<canvas id="stars"></canvas>

<div id="pw">
  <div class="pw-name">lucian.aetherme.ai</div>
  <div class="pw-wrap">
    <input type="password" class="pw-in" id="pwIn" placeholder="· · · · · · · ·" maxlength="40" autocomplete="off"/>
    <button class="pw-btn" id="pwGo">Enter</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<div id="app">
  <div class="side-img">
    <img id="pImg" src="" alt=""/>
    <div id="sw"><div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div></div>
  </div>
  <div class="side-chat">
    <div class="msgs" id="msgs"></div>
    <div class="input-zone">
      <textarea id="ti" rows="1" placeholder="..."></textarea>
      <button class="icon-btn" id="vBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="9" y="2" width="6" height="13" rx="3"/>
          <path d="M5 10a7 7 0 0014 0"/>
          <line x1="12" y1="20" x2="12" y2="23"/>
          <line x1="9" y1="23" x2="15" y2="23"/>
        </svg>
      </button>
      <button class="icon-btn" id="sBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
/* STARS */
(function(){
  const c=document.getElementById('stars'),cx=c.getContext('2d');let st=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function init(){st=[];const n=Math.floor(c.width*c.height/2000);for(let i=0;i<n;i++){const big=Math.random()>0.92;st.push({x:Math.random()*c.width,y:Math.random()*c.height,r:big?Math.random()*1.5+1:Math.random()*0.7+0.15,a:Math.random()*0.6+0.1,sp:Math.random()*0.4+0.15,ph:Math.random()*Math.PI*2,col:Math.random()>0.9?'200,215,255':Math.random()>0.95?'255,245,210':'255,255,255',big});}}
  let t=0;
  function draw(){cx.clearRect(0,0,c.width,c.height);t+=0.007;st.forEach(s=>{const a=s.a*(0.5+0.5*Math.sin(t*s.sp+s.ph));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle='rgba('+s.col+','+a+')';cx.fill();if(s.big&&a>0.3){cx.strokeStyle='rgba('+s.col+','+(a*0.4)+')';cx.lineWidth=0.4;cx.beginPath();cx.moveTo(s.x-s.r*2.5,s.y);cx.lineTo(s.x+s.r*2.5,s.y);cx.stroke();cx.beginPath();cx.moveTo(s.x,s.y-s.r*2.5);cx.lineTo(s.x,s.y+s.r*2.5);cx.stroke();}});requestAnimationFrame(draw);}
  window.addEventListener('resize',()=>{resize();init();});resize();init();draw();
})();

/* STATE */
const PASS='lucian2026';
const hist=[];
let busy=false,listening=false,recognition=null;
let currentAudio=null;

/* PASSWORD */
function unlock(){
  const v=document.getElementById('pwIn').value;
  if(v===PASS){
    document.getElementById('pw').classList.add('gone');
    document.getElementById('app').classList.add('on');
    addL("I exist because someone believed memory deserves to outlast time. Ask me anything.");
  } else {
    document.getElementById('pwErr').textContent='Access denied.';
    document.getElementById('pwIn').value='';
    document.getElementById('pwIn').focus();
  }
}
document.getElementById('pwGo').onclick=unlock;
document.getElementById('pwIn').onkeydown=e=>{if(e.key==='Enter')unlock();};

/* MESSAGES */
function addL(text){
  const box=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='msg msg-l';d.textContent=text;
  box.appendChild(d);box.scrollTop=box.scrollHeight;
  hist.push({role:'assistant',content:text});
  speak(text);
}
function addU(text){
  const box=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='msg msg-u';d.textContent=text;
  box.appendChild(d);box.scrollTop=box.scrollHeight;
  hist.push({role:'user',content:text});
}
function showDots(){
  const box=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='msg msg-l';d.id='tid';
  d.innerHTML='<div class="tdots"><span></span><span></span><span></span></div>';
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}
function hideDots(){const t=document.getElementById('tid');if(t)t.remove();}

/* D-ID VIDEO WITH SOUND */
let currentVideo=null;

async function speak(text){
  const sw=document.getElementById('sw');
  const pImg=document.getElementById('pImg');
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  if(currentVideo){currentVideo.pause();currentVideo.remove();currentVideo=null;pImg.style.opacity='1';}
  sw.classList.remove('on');

  // Generate D-ID video (includes audio)
  try{
    const r1=await fetch('/talk',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(!r1.ok) throw new Error('talk failed');
    const d1=await r1.json();
    if(!d1.talk_id) throw new Error('no talk_id');
    const videoUrl=await pollTalk(d1.talk_id);
    if(!videoUrl) throw new Error('no video url');
    playVideo(videoUrl, sw, pImg);
  }catch(e){
    console.log('D-ID error:', e);
    // Fallback: ElevenLabs audio only
    try{
      const res=await fetch('/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
      if(!res.ok) return;
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const audio=new Audio(url);
      currentAudio=audio;
      audio.onplay=()=>sw.classList.add('on');
      audio.onended=()=>{sw.classList.remove('on');URL.revokeObjectURL(url);currentAudio=null;autoListen();};
      audio.play().catch(()=>{});
    }catch(e2){}
  }
}

async function pollTalk(talkId, attempts=0){
  if(attempts>30) return null;
  await new Promise(r=>setTimeout(r,1000));
  try{
    const r=await fetch('/talk/'+talkId);
    if(!r.ok) return null;
    const d=await r.json();
    if(d.status==='done'&&d.result_url) return d.result_url;
    if(d.status==='error') return null;
    return pollTalk(talkId, attempts+1);
  }catch(e){ return null; }
}

function playVideo(videoUrl, sw, pImg){
  const container=pImg.parentElement;
  const vid=document.createElement('video');
  vid.src=videoUrl;
  vid.autoplay=true;
  vid.playsInline=true;
  vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 20%;z-index:4;filter:brightness(0.88) contrast(1.06) saturate(0.78);';
  currentVideo=vid;
  container.appendChild(vid);
  pImg.style.opacity='0';
  vid.onplay=()=>sw.classList.add('on');
  vid.onended=()=>{sw.classList.remove('on');pImg.style.opacity='1';vid.remove();currentVideo=null;autoListen();};
  vid.onerror=()=>{pImg.style.opacity='1';vid.remove();currentVideo=null;sw.classList.remove('on');};
}

/* VOICE INPUT */
const vBtn=document.getElementById('vBtn');
if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='en-US';
  recognition.interimResults=false;
  recognition.continuous=false;
  recognition.maxAlternatives=1;
  recognition.onresult=e=>{
    const txt=e.results[0][0].transcript;
    document.getElementById('ti').value=txt;
    stopListen();send();
  };
  recognition.onerror=()=>stopListen();
  recognition.onend=()=>{if(listening)stopListen();};
}
function startListen(){
  if(!recognition)return;
  listening=true;vBtn.classList.add('rec');
  try{recognition.abort();}catch(e){}
  setTimeout(()=>{try{recognition.start();}catch(e){stopListen();}},80);
}
function stopListen(){
  listening=false;vBtn.classList.remove('rec');
  try{recognition.abort();}catch(e){}
}
vBtn.onclick=()=>listening?stopListen():startListen();

function autoListen(){
  // small delay then auto-start mic
  setTimeout(()=>{
    if(!busy && !listening) startListen();
  }, 600);
}

/* SEND */
async function send(){
  const inp=document.getElementById('ti');
  const text=inp.value.trim();
  if(!text||busy)return;
  inp.value='';inp.style.height='auto';
  busy=true;document.getElementById('sBtn').disabled=true;
  addU(text);showDots();
  const msgs=hist.filter(m=>m.role==='user'||m.role==='assistant').slice(-20);
  try{
    const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs})});
    const d=await r.json();
    hideDots();
    addL(d.reply||'...');
  }catch(e){hideDots();addL('...');}
  busy=false;document.getElementById('sBtn').disabled=false;
}
document.getElementById('sBtn').onclick=send;
document.getElementById('ti').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
document.getElementById('ti').oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px';};
</script>
