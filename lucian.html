<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Project Aether — Lucian Ștefan</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #070b14;
    --accent: #4a90d9;
    --text: #d0d8e8;
    --text-dim: #6a7a95;
    --bubble-user: rgba(74,144,217,0.12);
    --bubble-lucian: rgba(15,25,50,0.85);
  }

  html, body {
    height: 100%;
    background: var(--deep);
    font-family: 'Jost', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 8% 12%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 38%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 8%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 28%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 83% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 13% 68%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 80%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== PASSWORD SCREEN ===== */
  #passwordScreen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--deep);
    flex-direction: column;
    gap: 2rem;
  }

  .pw-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
    text-align: center;
  }

  .pw-logo span {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: var(--text-dim);
    margin-top: 0.4rem;
    font-family: 'Jost', sans-serif;
    font-weight: 200;
  }

  .pw-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    width: 280px;
  }

  .pw-box input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(74,144,217,0.2);
    border-radius: 6px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    outline: none;
    text-align: center;
    transition: border-color 0.3s;
  }

  .pw-box input:focus {
    border-color: rgba(74,144,217,0.5);
  }

  .pw-box button {
    width: 100%;
    background: rgba(74,144,217,0.15);
    border: 1px solid rgba(74,144,217,0.3);
    border-radius: 6px;
    padding: 0.75rem;
    color: var(--accent);
    font-family: 'Jost', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
  }

  .pw-box button:hover {
    background: rgba(74,144,217,0.25);
    border-color: rgba(74,144,217,0.5);
  }

  .pw-error {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: #e05c5c;
    height: 1rem;
    text-align: center;
  }

  /* ===== MAIN LAYOUT ===== */
  .layout {
    display: flex;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  .left-panel {
    width: 45%;
    position: relative;
    overflow: hidden;
    border-right: 1px solid rgba(74,144,217,0.08);
  }

  .left-panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right, transparent 60%, rgba(7,11,20,0.9) 100%
    ), linear-gradient(
      to top, rgba(7,11,20,0.7) 0%, transparent 40%
    );
    pointer-events: none;
  }

  .avatar-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
    filter: brightness(0.88) contrast(1.05) saturate(0.85);
  }

  .status-dot {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: blink 2.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .speaking-indicator {
    display: none;
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.58rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .speaking-indicator.active { display: flex; }
  .speak-wave { display: flex; gap: 2px; align-items: center; }
  .speak-wave span { display: block; width: 2px; background: var(--accent); border-radius: 2px; animation: wave 0.8s ease-in-out infinite; }
  .speak-wave span:nth-child(1) { height: 5px; }
  .speak-wave span:nth-child(2) { height: 9px; animation-delay: 0.1s; }
  .speak-wave span:nth-child(3) { height: 7px; animation-delay: 0.2s; }
  .speak-wave span:nth-child(4) { height: 11px; animation-delay: 0.3s; }
  .speak-wave span:nth-child(5) { height: 5px; animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.8); }
  }

  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 2rem 2.5rem 1.5rem;
    overflow: hidden;
  }

  .header {
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(74,144,217,0.08);
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--text);
  }

  .header p {
    font-size: 0.62rem;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding-right: 0.5rem;
    scrollbar-width: thin;
    scrollbar-color: rgba(74,144,217,0.15) transparent;
  }

  .message { display: flex; }
  .message.user { justify-content: flex-end; }
  .message.lucian { justify-content: flex-start; }

  .msg-bubble {
    max-width: 80%;
    padding: 0.7rem 1rem;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.6;
    font-weight: 300;
  }

  .message.user .msg-bubble {
    background: var(--bubble-user);
    border: 1px solid rgba(74,144,217,0.15);
    border-bottom-right-radius: 3px;
    color: var(--text);
  }

  .message.lucian .msg-bubble {
    background: var(--bubble-lucian);
    border: 1px solid rgba(255,255,255,0.04);
    border-bottom-left-radius: 3px;
    color: var(--text);
  }

  .typing { display: flex; gap: 5px; align-items: center; padding: 0.7rem 1rem; }
  .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.5; animation: bounce 1.2s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  .input-area {
    display: flex;
    align-items: flex-end;
    gap: 0.75rem;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(74,144,217,0.08);
  }

  textarea {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(74,144,217,0.15);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 42px;
    max-height: 100px;
    transition: border-color 0.3s;
  }
  textarea:focus { border-color: rgba(74,144,217,0.35); }
  textarea::placeholder { color: var(--text-dim); }

  .btn-send, .btn-mic {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(74,144,217,0.2);
    background: rgba(74,144,217,0.08);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.25s, border-color 0.25s;
  }
  .btn-send:hover, .btn-mic:hover { background: rgba(74,144,217,0.18); border-color: rgba(74,144,217,0.4); }
  .btn-send svg, .btn-mic svg { width: 16px; height: 16px; }
  .btn-mic.listening { background: rgba(74,144,217,0.3); border-color: var(--accent); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(74,144,217,0.3); } 50% { box-shadow: 0 0 0 6px rgba(74,144,217,0); } }

  /* ===== MOBILE ===== */
  @media (max-width: 640px) {
    body { overflow: auto; }
    .layout { flex-direction: column; height: auto; min-height: 100vh; }
    .left-panel { width: 100%; height: 240px; border-right: none; border-bottom: 1px solid rgba(74,144,217,0.08); }
    .right-panel { padding: 1.25rem 1.25rem 1rem; }
  }
</style>
</head>

    <button id="pwBtn">Enter</button>
    <div class="pw-error" id="pwError"></div>

<script>
// ===== PASSWORD =====
const ACCESS_CODE = 'aether2024';

document.getElementById('pwBtn').addEventListener('click', checkPassword);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

function checkPassword() {
  const val = document.getElementById('pwInput').value.trim();
  if (val === ACCESS_CODE) {
    document.getElementById('passwordScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    speechSynthesis.getVoices();
  } else {
    document.getElementById('pwError').textContent = 'Incorrect access code.';
    document.getElementById('pwInput').value = '';
    setTimeout(() => document.getElementById('pwError').textContent = '', 2500);
  }
}

// ===== CHAT =====
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const speakingIndicator = document.getElementById('speakingIndicator');
let history = [], isListening = false, currentUtterance = null;

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : 'lucian');
  div.innerHTML = '<div class="msg-bubble">' + text + '</div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message lucian'; div.id = 'typing';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function speak(text) {
  if (!window.speechSynthesis) return;
  if (currentUtterance) speechSynthesis.cancel();
  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.lang = 'en-US';
  currentUtterance.rate = 0.88;
  currentUtterance.pitch = 0.82;
  const voices = speechSynthesis.getVoices();
  // Prefer a male English voice
  const v = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('male'))
         || voices.find(v => v.lang.startsWith('en') && (v.name.toLowerCase().includes('david') || v.name.toLowerCase().includes('mark') || v.name.toLowerCase().includes('daniel') || v.name.toLowerCase().includes('alex')))
         || voices.find(v => v.lang.startsWith('en'));
  if (v) currentUtterance.voice = v;
  speakingIndicator.classList.add('active');
  currentUtterance.onend = () => speakingIndicator.classList.remove('active');
  currentUtterance.onerror = () => speakingIndicator.classList.remove('active');
  speechSynthesis.speak(currentUtterance);
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  inputEl.value = ''; inputEl.style.height = 'auto';
  showTyping(); sendBtn.disabled = true;
  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-12) })
    });
    const data = await res.json();
    removeTyping();
    if (data.reply) {
      addMessage('lucian', data.reply);
      history.push({ role: 'assistant', content: data.reply });
      speak(data.reply);
    }
  } catch(e) {
    removeTyping();
    addMessage('lucian', 'Connection error.');
  }
  sendBtn.disabled = false;
}

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SR();
  recognition.lang = 'en-US';
  recognition.onresult = e => { inputEl.value = e.results[0][0].transcript; sendMessage(); };
  recognition.onend = () => { isListening = false; micBtn.classList.remove('listening'); };
  recognition.onerror = () => { isListening = false; micBtn.classList.remove('listening'); };
  micBtn.addEventListener('click', () => {
    if (isListening) { recognition.stop(); }
    else { if (currentUtterance) speechSynthesis.cancel(); recognition.start(); isListening = true; micBtn.classList.add('listening'); }
  });
} else { micBtn.style.opacity = '0.3'; }

speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
</script>
</body>
